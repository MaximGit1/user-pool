services:
  api:
    container_name: user_pool_api
    build:
      context: .
      dockerfile: ./configs/Dockerfile
    restart: unless-stopped
    networks:
      - backend-net


  postgres:
    image: postgres:16
    restart: unless-stopped
    volumes: [ postgres_data:/var/lib/postgresql/data ]
    networks: [ backend-net ]
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes: [ redis_data:/data ]
    networks: [ backend-net ]
    command: redis-server --requirepass ${REDIS_PASSWORD}

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./configs/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./configs/nginx/certs:/etc/nginx/certs:ro
    depends_on: [ api, grafana ]
    networks: [ backend-net ]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [ backend-net ]

  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    container_name: loki
    hostname: loki
    volumes:
      - ./configs/loki-config.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    networks: [ backend-net ]

  vector:
    image: timberio/vector:latest-alpine
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./configs/vector.toml:/etc/vector/vector.toml:ro
    command: --config-toml /etc/vector/vector.toml
    depends_on:
      - loki
    entrypoint: sh -c "until wget -qO- http://loki:3100/ready; do echo 'Waiting for Loki'; sleep 1; done; vector --config-toml /etc/vector/vector.toml"
    networks: [ backend-net ]

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_ROOT_URL=https://localhost/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks: [ backend-net ]


networks:
  backend-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data: